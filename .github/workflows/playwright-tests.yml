name: Playwright Tests

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      - name: Run Playwright tests
        run: yarn playwright test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
          if-no-files-found: ignore

      - name: Send Teams notification on failure
        if: ${{ failure() && secrets.TEAMS_WEBHOOK_URL != '' }}
        shell: bash
        run: |
          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "Playwright Tests Failed",
              "sections": [
                {
                  "activityTitle": "PR: ${{ github.event.pull_request.title }}",
                  "facts": [
                    {
                      "name": "Author",
                      "value": "${{ github.event.pull_request.user.login }}"
                    },
                    {
                      "name": "Branch",
                      "value": "${{ github.event.pull_request.head.ref }}"
                    }
                  ]
                }
              ],
              "potentialAction": [
                {
                  "@type": "OpenUri",
                  "name": "View Workflow Run",
                  "targets": [
                    {
                      "os": "default",
                      "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }'

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      - name: Run security scan
        continue-on-error: false
        shell: bash
        run: |
          echo "## Security Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          yarn audit --audit-level high > audit_output.txt 2>&1 || true

          if grep -Eqi "high|critical" audit_output.txt; then
            cat audit_output.txt >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "High or critical vulnerabilities detected." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "No high or critical vulnerabilities found." >> "$GITHUB_STEP_SUMMARY"
          fi